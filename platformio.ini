; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = MainMotorController
src_dir = Projects/${platformio.default_envs}
boards_dir = ./boards

[env]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
upload_protocol = esptool
build_flags =
    -DDISABLE_ALL_LIBRARY_WARNINGS

[env:MainMotorController]
build_src_filter = +<*> -<STM32_Code/> -<helpers_tools/> -<xbox_controller_ble.*>
lib_deps =
    ; XboxSeriesXControllerESP32_asukiaaa – version locale dans lib/ (patché NimBLE 2.x)
    h2zero/NimBLE-Arduino@^2.3.6
    bblanchon/ArduinoJson@^7.0.4
    pololu/VL53L0X@^1.3.1
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit INA219@^1.2.1
